name: Code Quality
on:
  push:
    branches:
      - '**'
    tags-ignore:
      - '*'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: pnpm/action-setup@v4
      with:
        version: 10.22.0
    - uses: actions/setup-node@v4
      with:
        node-version: "24"
        cache: pnpm
    - run: pnpm install --frozen-lockfile
    - name: Linting and prettifying
      run: |
        pnpm lint
        pnpm prettier
      working-directory: ./
