name: Deploy new documentation to GitHub Pages

on:
  push:
    branches: ["**"]
    paths:
      - "apps/docs-new/**"
      - "apps/web/openapi/**"
      - ".github/workflows/deploy-docs-new-to-pages.yml"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-docs-new"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate OpenAPI spec
        run: pnpm --filter @courselit/web openapi:generate

      - name: Build docs site
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ steps.pages.outputs.base_path }}
          NEXT_PUBLIC_ORAMA_DATASOURCE_ID: "bd757e41-d4a8-43c2-9b7d-40d88bdcfb7a"
          NEXT_PUBLIC_ORAMA_PROJECT_ID: "f3d9449b-526d-4f63-a44c-b1e3f0916086"
          NEXT_PUBLIC_ORAMA_API_KEY: "c1_lixizm9uo-hnVzvlPbb9QJOyUoqHQDuQWIUCpLbhCCejzSV4Ztf-WAbP2Vq"
          ORAMA_PRIVATE_API_KEY: ${{ secrets.ORAMA_PRIVATE_API_KEY }}
        run: pnpm --filter @courselit/docs-new build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./apps/docs-new/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
